<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Búsqueda11</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    .container {
      text-align: center;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 24px;
    }

    .search-box {
      margin: 20px 0;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 16px;
      width: 80%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #e9e9e9;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Formulario de Búsqueda API</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Escribe algo para buscar..." />
      <button onclick="buscar()">Buscar</button>
    </div>
    <div id="result" class="result" style="display: none;">
      <h3>Resultado de la API:</h3>
      <pre id="resultContent"></pre>
    </div>
  </div>

  <script>
    function buscar() {
      let query = document.getElementById("searchInput").value;
      
      if (query) {
        fetchData(query);
      } else {
        alert("Por favor, ingresa un término para buscar.");
      }
    }

    function fetchData(query) {
      // URL de la API que proporcionaste
      const apiUrl = `https://app.flokzu.com/flokzuopenapi/api/v2/process/instance`;
      
      fetch(apiUrl, {
        method: 'GET',
        headers: {
          'X-Api-Key': 'e3bf3bd4d3e74d253d71858503acd3100761ad5ce37',
          'X-Username': 'juan.cetina@s4learning.com',
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        }
      })
      .then(response => response.json())
      .then(data => {
        console.log(data);
        // Mostrar los resultados
        document.getElementById("result").style.display = "block";
        document.getElementById("resultContent").textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        alert("Hubo un error al obtener los datos de la API.");
        console.error('Error:', error);
      });
    }
  </script>

</body>
</html>
